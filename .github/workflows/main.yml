name: Update Cats Database

on:
  schedule:
    - cron: '00 23 * * *' # Каждый день в 03:00 по Warsaw
  workflow_dispatch: # Запуск вручную по кнопке

env:
  TZ: 'Europe/Warsaw'

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:

    - name: Скачиваем файлы
      uses: actions/checkout@v4

    - name: Устанавливаем .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Запускаем парсер
      env:
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      run: dotnet run

    - name: Сохраняем изменения на сайт
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add cats.json history.json
        git commit -m "Автоматическое обновление базы котов 🤖🐱" || echo "Новых котов пока нет"
        git push

    - name: Отправка кота дня в Discord
      run: |
        DAILY_CAT=$(node -e "
          const fs = require('fs');
          const cats = JSON.parse(fs.readFileSync('cats.json'));
          const now = new Date();
          const daySeed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
          const x = Math.sin(daySeed) * 10000;
          const index = Math.floor((x - Math.floor(x)) * cats.length);
          console.log(cats[index]);
        ")

        # Сохраняем кота дня в файл
        echo "{\"url\": \"$DAILY_CAT\"}" > today.json
        git add today.json
        git commit -m "Кот дня обновлён 🐱" || echo "today.json не изменился"
        git push || echo "Нечего пушить"

        IS_VIDEO=$(node -e "
          const url = '$DAILY_CAT';
          console.log(url.includes('/video/upload/') ? 'true' : 'false');
        ")

        if [ "$IS_VIDEO" = "true" ]; then
          curl -s -H "Content-Type: application/json" \
               -d "{\"content\": \"@everyone 🐱 Кот дня:\n$DAILY_CAT\n||[Сайт](https://gudutama.github.io/random-cats/)||\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}
        else
          curl -s -H "Content-Type: application/json" \
               -d "{\"content\": \"@everyone\", \"embeds\": [{\"title\": \"🐱 Кот дня\", \"description\": \"||[Сайт](https://gudutama.github.io/random-cats/)||\", \"image\": {\"url\": \"$DAILY_CAT\"}, \"color\": 5793266}]}" \
               ${{ secrets.DISCORD_WEBHOOK }}
        fi
