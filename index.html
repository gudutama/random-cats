<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>glupiikotiki</title>
    <style>
        * { box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 { margin-bottom: 5px; margin-top: 5px; }
        h2 { margin: 5px 0 15px 0; color: #aaaaaa; font-weight: normal; }

        .media-wrap {
            width: 90vw;
            max-width: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        /* Фото */
        #cat-image {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: none;
        }

        /* Видео */
        #cat-video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: none;
            background: #000;
        }

        .loader { font-size: 18px; color: #aaaaaa; }

        /* Кнопка следующего кота */
        #next-btn {
            margin-top: 18px;
            padding: 10px 28px;
            font-size: 16px;
            background: #5865F2;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #next-btn:hover { background: #4752c4; }

        a { color: #aaaaaa; text-decoration: none; font-size: 12px; margin: 12px; }
        a:hover { color: #ffffff; }
    </style>
</head>
<body>
    <h1>🐱 Кот дня</h1>
    <h2>а может и не кот...</h2>

    <div class="media-wrap">
        <div id="loading" class="loader">Ищем кота в базе...</div>
        <img id="cat-image" src="" alt="Кот дня">
        <video id="cat-video" controls autoplay loop muted playsinline></video>
    </div>

   

    <a href="https://t.me/glupiikotiki">source</a>

    <script>
        let catsDatabase = [];

    async function loadDatabase() {
    try {
        // Читаем кота дня из файла который создал бот
      const response = await fetch('today.json?t=' + Date.now());
        const today = await response.json();
        document.getElementById('loading').style.display = 'none';
        showMedia(today.url);
    } catch (error) {
        document.getElementById('loading').innerText = 'Ошибка загрузки базы котов :(';
    }
}


        function showMedia(url) {
            if (!url) return;
            const img = document.getElementById('cat-image');
            const video = document.getElementById('cat-video');

            img.style.display = 'none';
            video.style.display = 'none';
            video.pause();

            // Cloudinary видео — URL содержит /video/upload/
            if (url.includes('/video/upload/') || url.endsWith('.mp4')) {
                video.src = url;
                video.style.display = 'block';
                video.play().catch(() => {});
            } else {
                img.src = url;
                img.style.display = 'block';
            }
        }

        loadDatabase();
    </script>
</body>
</html>
